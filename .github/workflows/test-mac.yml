name: Test Platforms
on: workflow_dispatch

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Test startup
        run: |
          python3 -c "
          import subprocess, sys
          result = subprocess.run(
              ['npx', '--yes', '@vrsen/openswarm'],
              timeout=60,
              capture_output=False,
              text=True,
              env={**__import__('os').environ, 'OPENSWARM_DEMO_SILENCE_CONSOLE': '0'}
          )
          " 2>&1 | tee output.txt || true
          grep -q "Traceback" output.txt && exit 1 || exit 0
